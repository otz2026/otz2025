        async function getUserInfo() {
            try {
                console.log('Получение информации о пользователе...');
                const parser = new UAParser();
                const result = parser.getResult();
                const device = result.device.type || 'Desktop';
                const deviceModel = result.device.model || result.os.name || 'Unknown';
                const browser = `${result.browser.name || 'Unknown'} ${result.browser.version || ''}`;
                let city = 'Unknown', country = 'Unknown', ip = 'Unknown';
                try {
                    const response = await fetch('https://ipapi.co/json/', { mode: 'no-cors', timeout: 5000 });
                    if (response.ok) {
                        const geoData = await response.json();
                        city = geoData.city || 'Unknown';
                        country = geoData.country_name || 'Unknown';
                        ip = geoData.ip || 'Unknown';
                    } else {
                        console.warn('Ошибка ответа от ipapi.co:', response.status);
                    }
                } catch (geoError) {
                    console.warn('Ошибка получения геоданных:', geoError.message);
                }
                const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                return {
                    device: `${device}, ${deviceModel}`,
                    browser,
                    location: `${city}, ${country}`,
                    ip,
                    extra: timestamp
                };
            } catch (error) {
                console.error('Ошибка получения информации о пользователе:', error.message);
                return {
                    device: 'Unknown',
                    browser: 'Unknown',
                    location: 'Unknown',
                    ip: 'Unknown',
                    extra: new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC'
                };
            }
        }

        async function fetchWithTimeout(url, options = {}, timeout = 15000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                console.log(`[Fetch] Запрос к ${url}`);
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                if (!response.ok) {
                    throw new Error(`HTTP ошибка: ${response.status} ${response.statusText}`);
                }
                console.log(`[Fetch] Успешно загружено: ${url}`);
                return response;
            } catch (error) {
                clearTimeout(id);
                console.error(`[Fetch] Ошибка загрузки ${url}:`, error.message);
                throw error;
            } finally {
                clearTimeout(id);
            }
        }

            try {
                const scriptApp = document.createElement('script');
                scriptApp.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
                scriptApp.type = 'module';
                document.head.appendChild(scriptApp);
                const scriptMessaging = document.createElement('script');
                scriptMessaging.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging.js';
                scriptMessaging.type = 'module';
                document.head.appendChild(scriptMessaging);
                await Promise.all([
                    new Promise((resolve, reject) => {
                        scriptApp.onload = resolve;
                        scriptApp.onerror = () => reject(new Error('Не удалось загрузить Firebase App SDK'));
                    }),
                    new Promise((resolve, reject) => {
                        scriptMessaging.onload = resolve;
                        scriptMessaging.onerror = () => reject(new Error('Не удалось загрузить Firebase Messaging SDK'));
                    })
                ]);
                console.log('Firebase SDK загружен резервно');
            } catch (error) {
                console.error('Ошибка загрузки резервного Firebase SDK:', error.message);
            }
        }

        async function loadFeaturedMatches() {
            const matchesContainer = document.getElementById('matchesContainer');
            if (!matchesContainer) {
                console.error('Контейнер matchesContainer не найден');
                return;
            }
            try {
                matchesContainer.innerHTML = `
                    <div class="match-loading">
                        <div class="basketball"></div>
                        <div class="loading-text">Загрузка матчей<span class="dots"></span></div>
                    </div>
                `;
                if (!navigator.onLine) throw new Error('Нет соединения с интернетом');
                let featuredData = FALLBACK_MATCHES;
                let scheduleData = FALLBACK_MATCHES.schedule;
                try {
                    const featuredResponse = await fetchWithTimeout(`${CONFIG.FEATURED_MATCHES_URL}?t=${Date.now()}`, { cache: 'no-store' });
                    featuredData = await featuredResponse.json();
                    const scheduleResponse = await fetchWithTimeout(`${CONFIG.SCHEDULE_DATA_URL}?t=${Date.now()}`, { cache: 'no-store' });
                    scheduleData = await scheduleResponse.json();
                    console.log('Матчи загружены:', featuredData, scheduleData);
                } catch (fetchError) {
                    console.warn('Используются резервные данные матчей:', fetchError.message);
                }
                displayFeaturedMatches(featuredData, scheduleData);
            } catch (error) {
                console.error('Ошибка загрузки матчей:', error.message);
                const message = !navigator.onLine ? 'Нет соединения с интернетом.' : `Не удалось загрузить матчи: ${error.message}`;
                showError(matchesContainer, message, 'match-error');
            }
        }

        function displayFeaturedMatches(featuredData, scheduleData) {
            const matchesContainer = document.getElementById('matchesContainer');
            if (!matchesContainer) return;
            try {
                let matchesToShow = [];
                
                // Проверяем, есть ли featured и schedule в данных
                if (!featuredData.featured || !Array.isArray(featuredData.featured) || !scheduleData) {
                    console.warn('Некорректные данные матчей, используются резервные');
                    matchesToShow = FALLBACK_MATCHES.schedule.opening_night;
                } else {
                    // Извлекаем матчи по ID из featured
                    featuredData.featured.forEach(matchId => {
                        const [stage, index] = matchId.split('|');
                        if (scheduleData[stage] && scheduleData[stage][index]) {
                            matchesToShow.push(scheduleData[stage][index]);
                        }
                    });
                    // Если ничего не найдено, используем резервные данные
                    if (matchesToShow.length === 0) {
                        console.warn('Матчи не найдены, используются резервные');
                        matchesToShow = FALLBACK_MATCHES.schedule.opening_night;
                    }
                }

                matchesContainer.innerHTML = matchesToShow.map(match => `
                    <div class="match-result">
                        <div class="teams">
                            <div class="team-logo">
                                <img src="${match.team1?.logo || '/otz2025/img/PPATROL.png'}" 
                                     alt="${match.team1?.name || 'Team 1'}"
                                     onerror="this.src='/otz2025/img/PPATROL.png'">
                                <div class="team-name">
                                    <a href="${match.team1?.link || '/otz2025/teams/PawPatrol'}">${match.team1?.name || 'Team 1'}</a>
                                </div>
                            </div>
                            <div class="score">${match.score || 'vs'}</div>
                            <div class="team-logo">
                                <img src="${match.team2?.logo || '/otz2025/img/RWE.png'}" 
                                     alt="${match.team2?.name || 'Team 2'}"
                                     onerror="this.src='/otz2025/img/RWE.png'">
                                <div class="team-name">
                                    <a href="${match.team2?.link || '/otz2025/teams/RWE'}">${match.team2?.name || 'Team 2'}</a>
                                </div>
                            </div>
                        </div>
                        <div class="date">${match.date || 'Дата уточняется'}</div>
                    </div>
                `).join('');
                console.log('Матчи отображены:', matchesToShow);
            } catch (error) {
                console.error('Ошибка отображения матчей:', error.message);
                showError(matchesContainer, 'Ошибка обработки данных матчей', 'match-error');
            }
        }

        async function loadNews() {
            const newsContainer = document.getElementById('newsContainer');
            if (!newsContainer) {
                console.error('Контейнер newsContainer не найден');
                return;
            }
            try {
                newsContainer.innerHTML = `
                    <div class="news-loading">
                        <div class="basketball"></div>
                        <div class="loading-text">Загрузка новостей<span class="dots"></span></div>
                    </div>
                `;
                if (!navigator.onLine) throw new Error('Нет соединения с интернетом');
                let newsData = FALLBACK_NEWS;
                try {
                    const response = await fetchWithTimeout(`${CONFIG.NEWS_DATA_URL}?t=${Date.now()}`, { cache: 'no-store' });
                    newsData = await response.json();
                    console.log('Новости загружены:', newsData);
                } catch (fetchError) {
                    console.warn('Используются резервные данные новостей:', fetchError.message);
                }
                displayNews(newsData);
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error.message);
                const message = !navigator.onLine ? 'Нет соединения с интернетом.' : `Не удалось загрузить новости: ${error.message}`;
                showError(newsContainer, message, 'news-error');
            }
        }

        function displayNews(newsData) {
            const newsContainer = document.getElementById('newsContainer');
            if (!newsContainer) return;
            try {
                if (!newsData || newsData.length === 0) {
                    console.warn('Нет новостей');
                    newsContainer.innerHTML = `
                        <div class="news-empty">
                            Новостей пока нет. Следите за обновлениями!
                        </div>
                    `;
                    return;
                }
                const sortedNews = [...newsData]
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 2);
                newsContainer.innerHTML = sortedNews.map(news => `
                    <div class="news-item">
                        <img src="${news.image || '/otz2025/img/NEWS_NO.png'}" 
                             alt="${news.title}" 
                             onerror="this.src='/otz2025/img/NEWS_NO.png'">
                        <div class="text">
                            <h3>${news.title}</h3>
                            <p>${news.content.length > 200 ? 
                                news.content.substring(0, 200) + '...' : 
                                news.content}</p>
                            <a href="/otz2025/news" class="read-more">Читать далее</a>
                        </div>
                    </div>
                `).join('');
                console.log('Новости отображены:', sortedNews);
            } catch (error) {
                console.error('Ошибка отображения новостей:', error.message);
                showError(newsContainer, 'Ошибка обработки данных новостей', 'news-error');
            }
        }

        function showError(container, message, className = 'error-message') {
            if (!container) return;
            container.innerHTML = `
                <div class="${className}">
                    <img src="/otz2025/img/OTZ3.png" alt="Error Logo" onerror="this.src='/otz2025/img/OTZ3.png'">
                    <div class="error-text">Ошибка...</div>
                    <p>${message}</p>
                    <button onclick="location.reload()">Обновить</button>
                </div>
            `;
        }

        function initScrollHeader() {
            const header = document.getElementById('header');
            if (header) {
                window.addEventListener('scroll', () => {
                    header.classList.toggle('scrolled', window.scrollY > 50);
                });
            }
        }

        function initFooterEasterEgg() {
            const footerText = document.querySelector('footer p');
            const hiddenLink = document.querySelector('footer .hidden');
            if (footerText && hiddenLink) {
                footerText.addEventListener('click', () => {
                    hiddenLink.classList.remove('hidden');
                    setTimeout(() => hiddenLink.classList.add('hidden'), 2000);
                });
            }
        }
    </script>
</body>
</html>
