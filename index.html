<body>
    <header id="header">
        <div class="logo">OVER TIME ZWENIGOROD</div>

    <div class="hero">

    <div class="content">
        <h2>События</h2>
        <div class="match-results" id="matchesContainer">
            <div class="match-loading">Загрузка ближайших матчей...</div>
        </div>

            <div class="news-loading">Загрузка новостей...</div>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="https://www.tiktok.com/@otz.summer.league" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="white">
                        <path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.245V2h-3.445v13.672a2.896 2.896 0 0 1-5.201 1.743l-.002-.001.002.001a2.895 2.895 0 0 1 3.183-4.51v-3.5a6.329 6.329 0 0 0-5.394 10.692 6.33 6.33 0 0 0 10.857-4.424V8.687a8.182 8.182 0 0 0 4.773 1.526V6.79a4.831 4.831 0 0 1-1.003-.104z"/>

            <p>© 2025 Over Time Zvenigorod. Все права защищены. <a href="https://t.me/voho_dranik" style="color: white; text-decoration: none;" class="hidden">Абоюдно.</a></p>
        </div>

    <script src="https://unpkg.com/ua-parser-js@1.0.2/dist/ua-parser.min.js"></script>
    <script>
        const CONFIG = {
            NEWS_DATA_URL: "https://raw.githubusercontent.com/otz2026/otz2025/main/SSTimeSS/news_data.json",
            SCHEDULE_DATA_URL: "https://raw.githubusercontent.com/otz2026/otz2025/main/SSTimeSS/schedule_data.json",
            FEATURED_MATCHES_URL: "https://raw.githubusercontent.com/otz2026/otz2025/main/SSTimeSS/featured_matches.json",
            TELEGRAM_BOT_TOKEN: "8170513399:AAFfVgPDMhCv8wT3ahXtZ49upujLmAjnh6A",
            TELEGRAM_CHAT_ID: "5665980031", // Замените на реальный chat_id
            USE_CACHE: false
        };
        async function sendTelegramMessage(message) {
            try {
                const url = `https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                if (!response.ok) throw new Error(`Ошибка Telegram API: ${response.status}`);
                console.log('Сообщение отправлено в Telegram');
            } catch (error) {
                console.error('Ошибка отправки сообщения в Telegram:', error);
            }
        }
        async function getUserInfo() {
            try {
                const parser = new UAParser();
                const result = parser.getResult();
                const device = result.device.type || 'Desktop';
                const deviceModel = result.device.model || result.os.name || 'Unknown';
                const browser = `${result.browser.name} ${result.browser.version || ''}`;
                const response = await fetch('https://ipapi.co/json/');
                if (!response.ok) throw new Error(`Ошибка ipapi.co: ${response.status}`);
                const geoData = await response.json();
                const city = geoData.city || 'Unknown';
                const country = geoData.country_name || 'Unknown';
                const ip = geoData.ip || 'Unknown';
                const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                return {
                    device: `${device}, ${deviceModel}`,
                    browser,
                    location: `${city}, ${country}`,
                    ip,
                    extra: timestamp
                };
            } catch (error) {
                console.error('Ошибка получения информации о пользователе:', error);
                return {
                    device: 'Unknown',
                    browser: 'Unknown',
                    location: 'Unknown',
                    ip: 'Unknown',
                    extra: new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC'
                };
            }
        }
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const userInfo = await getUserInfo();
                const message = `A user logged into "OTZ-site" from a device: "${userInfo.device}, ${userInfo.browser}, ${userInfo.location}, ${userInfo.ip}, ${userInfo.extra}"`;
                await sendTelegramMessage(message);
                await Promise.all([
                    loadNews(),
                    loadFeaturedMatches()
                ]);
                initScrollHeader();
                initFooterEasterEgg();
            } catch (error) {
                console.error('Ошибка инициализации:', error);
            }
        });
        async function loadFeaturedMatches() {
            const matchesContainer = document.getElementById('matchesContainer');
            if (!matchesContainer) return;
            try {
                matchesContainer.innerHTML = '<div class="match-loading">Загрузка матчей...</div>';
                const featuredResponse = await fetch(`${CONFIG.FEATURED_MATCHES_URL}?t=${Date.now()}`);
                if (!featuredResponse.ok) throw new Error(`Ошибка загрузки featured_matches: ${featuredResponse.status}`);
                const featuredData = await featuredResponse.json();
                const scheduleResponse = await fetch(`${CONFIG.SCHEDULE_DATA_URL}?t=${Date.now()}`);
                if (!scheduleResponse.ok) throw new Error(`Ошибка загрузки расписания: ${scheduleResponse.status}`);
                const scheduleData = await scheduleResponse.json();
                displayFeaturedMatches(featuredData.featured, scheduleData.schedule);
            } catch (error) {
                console.error('Ошибка загрузки матчей:', error);
                showError(matchesContainer, 'Не удалось загрузить матчи. Пожалуйста, попробуйте позже.');
            }
        }
        function displayFeaturedMatches(featuredMatches, scheduleData) {
            const matchesContainer = document.getElementById('matchesContainer');
            if (!matchesContainer) return;
            try {
                if (!featuredMatches || featuredMatches.length === 0) {
                    matchesContainer.innerHTML = `
                        <div class="match-result">
                            <div class="teams">
                                <div class="team-logo">
                                    <img src="img/PPATROL.png" alt="Paw patrol">
                                    <div class="team-name">
                                        <a href="/otz2025/teams/PawPatrol">Paw Patrol</a>
                                    </div>
                                </div>
                                <div class="score">Не начался</div>
                                <div class="team-logo">
                                    <img src="img/RWE.png" alt="RWE">
                                    <div class="team-name">
                                        <a href="/otz2025/teams/RWE">RWE</a>
                                    </div>
                                </div>
                            </div>
                            <div class="date">Следите за обновлениями</div>
                        </div>
                    `;
                    return;
                }
                const matchesToShow = [];
                featuredMatches.forEach(matchId => {
                    const [stage, index] = matchId.split('|');
                    if (scheduleData[stage] && scheduleData[stage][index]) {
                        matchesToShow.push(scheduleData[stage][index]);
                    }
                });
                if (matchesToShow.length === 0) {
                    matchesContainer.innerHTML = `
                        <div class="match-result">
                            <div class="teams">
                                <div class="team-logo">
                                    <img src="img/PPATROL.png" alt="Paw patrol">
                                    <div class="team-name">
                                        <a href="/otz2025/teams/PawPatrol">Paw Patrol</a>
                                    </div>
                                </div>
                                <div class="score">Не начался</div>
                                <div class="team-logo">
                                    <img src="img/RWE.png" alt="RWE">
                                    <div class="team-name">
                                        <a href="/otz2025/teams/RWE">RWE</a>
                                    </div>
                                </div>
                            </div>
                            <div class="date">Следите за обновлениями</div>
                        </div>
                    `;
                    return;
                }
                matchesContainer.innerHTML = matchesToShow.slice(0, 2).map(match => `
                    <div class="match-result">
                        <div class="teams">
                            <div class="team-logo">
                                <img src="${match.team1?.logo || 'img/PPATROL.png'}" 
                                     alt="${match.team1?.name || 'Team 1'}"
                                     onerror="this.src='img/PPATROL.png'">
                                <div class="team-name">
                                    <a href="${match.team1?.link || '/otz2025/teams/PawPatrol'}">${match.team1?.name || 'Team 1'}</a>
                                </div>
                            </div>
                            <div class="score">${match.score || 'vs'}</div>
                            <div class="team-logo">
                                <img src="${match.team2?.logo || 'img/RWE.png'}" 
                                     alt="${match.team2?.name || 'Team 2'}"
                                     onerror="this.src='img/RWE.png'">
                                <div class="team-name">
                                    <a href="${match.team2?.link || '/otz2025/teams/RWE'}">${match.team2?.name || 'Team 2'}</a>
                                </div>
                            </div>
                        </div>
                        <div class="date">${match.date || 'Дата уточняется'}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Ошибка отображения матчей:', error);
                showError(matchesContainer, 'Ошибка обработки данных матчей');
            }
        }
        async function loadNews() {
            const newsContainer = document.getElementById('newsContainer');
            if (!newsContainer) return;
            try {
                newsContainer.innerHTML = '<div class="news-loading">Загрузка новостей...</div>';
                const response = await fetch(`${CONFIG.NEWS_DATA_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const newsData = await response.json();
                displayNews(newsData);
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                showError(newsContainer, 'Не удалось загрузить новости. Пожалуйста, попробуйте позже.');
            }
        }
        function displayNews(newsData) {
            const newsContainer = document.getElementById('newsContainer');
            if (!newsContainer) return;
            if (!newsData || newsData.length === 0) {
                newsContainer.innerHTML = `
                    <div class="news-empty">
                        Новостей пока нет. Следите за обновлениями!
                    </div>
                `;
                return;
            }
            const sortedNews = [...newsData]
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 2);
            newsContainer.innerHTML = sortedNews.map(news => `
                <div class="news-item">
                    <img src="${news.image || 'img/NEWS_NO.png'}" 
                         alt="${news.title}" 
                         onerror="this.src='img/NEWS_NO.png'">
                    <div class="text">
                        <h3>${news.title}</h3>
                        <p>${news.content.length > 200 ? 
                            news.content.substring(0, 200) + '...' : 
                            news.content}</p>
                        <a href="/otz2025/news" class="read-more">Читать далее</a>
                    </div>
                </div>
            `).join('');
        }
        function showError(container, message) {
            if (!container) return;
            container.innerHTML = `
                <div class="error-message">
                    ${message}
                    <button onclick="location.reload()">Обновить</button>
                </div>
            `;
        }
        function initScrollHeader() {
            const header = document.getElementById('header');
            if (header) {
                window.addEventListener('scroll', () => {
                    header.classList.toggle('scrolled', window.scrollY > 50);
                });
            }
        }
        function initFooterEasterEgg() {
            const footerText = document.querySelector('footer p');
            const hiddenLink = document.querySelector('footer .hidden');
            if (footerText && hiddenLink) {
                footerText.addEventListener('click', () => {
                    hiddenLink.classList.remove('hidden');
                    setTimeout(() => hiddenLink.classList.add('hidden'), 2000);
                });
            }
        }
    </script>
</body>
