    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2a2a2a;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            z-index: 1000;
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }
        header.scrolled {
            background-color: rgba(0, 0, 0, 0.7);
        }
        header .logo {
            position: absolute;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        header nav {
            display: flex;
            gap: 20px;
        }
        header nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.3s ease;
        }
        header nav a:hover {
            color: #ccc;
        }
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            box-sizing: border-box;
            text-align: center;
            margin-top: 80px;
            width: 100%;
        }
        .team-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .team-info img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .team-info .team-name {
            font-size: 36px;
            font-weight: bold;
        }
        .team-info .team-description {
            font-size: 18px;
            color: #ccc;
        }
        .team-info .team-name::after {
            content: '';
           uzesdisplay: block;
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 10px 0;
        }
        .table-header {
            text-align: left;
            margin-bottom: 20px;
        }
        .table-header h3 {
            font-size: 24px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .table-header hr {
            border: 0;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 0;
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            margin-bottom: 40px;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 600px;
        }
        th, td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }
        th:last-child, td:last-child {
            border-right: none;
        }
        th {
            background-color: #dd4710;
            font-weight: bold;
        }
        tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        .team-logo {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            margin-right: 10px;
        }
        .team-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .team-squad {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        .player-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .player-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .player-info {
            text-align: left;
        }
        .player-info .player-name {
            font-size: 20px;
            font-weight: bold;
        }
        .player-info .player-stats {
            font-size: 16px;
            color: #ccc;
        }
        .loading-animation {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            width: 100%;
            text-align: center;
        }
        .loading-animation.error .loading-text {
            color: #ccc;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .basketball {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f28c38 10%, #d2691e 70%);
            border-radius: 50%;
            position: relative;
            animation: bounce 0.6s infinite alternate;
            margin-bottom: 15px;
        }
        .basketball::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 60%;
            height: 80%;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.2), transparent);
            border-radius: 50%;
        }
        .loading-text {
            font-size: 18px;
            color: #ccc;
        }
        .dots::after {
            content: '...';
            display: inline-block;
            width: 1.5em;
            text-align: left;
            animation: dots 1.5s infinite;
        }
        .refresh-button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .refresh-button:hover {
            background-color: #555;
            transform: scale(1.05);
        }
        .refresh-button:active {
            transform: scale(0.95);
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        footer {
            background-color: #000;
            padding: 40px 20px;
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }
        .social-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .social-links a {
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .social-links a:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }
        .social-links img {
            width: 24px;
            height: 24px;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 10px;
                padding-top: env(safe-area-inset-top, 10px);
            }
            header .logo {
                position: static;
                margin-bottom: 10px;
                text-align: center;
            }
            header nav {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .content {
                margin-top: 120px;
                padding: 15px;
                padding-bottom: env(safe-area-inset-bottom, 15px);
            }
            .team-info {
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                text-align: left;
            }
            .team-info img {
                width: 100px;
                height: 100px;
            }
            .team-info .team-name {
                font-size: 28px;
            }
            .team-info .team-name::after {
                margin: 8px 0;
            }
            .team-info .team-description {
                font-size: 16px;
            }
            .table-header h3 {
                font-size: 22px;
            }
            th, td {
                padding: 12px;
                font-size: 14px;
            }
            .team-logo {
                width: 24px;
                height: 24px;
            }
            .player-card {
                flex-direction: column;
                text-align: center;
            }
            .player-card img {
                width: 100px;
                height: 100px;
            }
            .player-info {
                text-align: center;
            }
            .basketball {
                width: 40px;
                height: 40px;
            }
            .loading-text {
                font-size: 16px;
            }
            .loading-animation.error .loading-text {
                font-size: 18px;
                margin-bottom: 15px;
            }
            .refresh-button {
                padding: 8px 16px;
                font-size: 16px;
            }
            footer {
                padding: 30px 15px;
                padding-bottom: env(safe-area-inset-bottom, 30px);
            }
        }
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top, 0);
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .content {
                margin-top: calc(80px + env(safe-area-inset-top, 0));
            }
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="logo">OVER TIME ZWENIGOROD</div>
        <nav>
            <a href="/otz2025/">Главная</a>
            <a href="/otz2025/news">Новости</a>
            <a href="/otz2025/table">Соревнования</a>
            <a href="/otz2025/reward">Награды</a>
        </nav>
    </header>
    <div class="content">
        <div class="team-info">
            <img src="/otz2025/img/KITTYBOYS.png" alt="Kitty Boys" id="teamLogo">
            <div>
                <div class="team-name">Kitty Boys</div>
                <div class="team-description">Сезон 2025</div>
            </div>
        </div>
        <div class="table-header">
            <h3>Рейтинг</h3>
            <hr>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Место</th>
                        <th>Команда</th>
                        <th>И</th>
                        <th>В</th>
                        <th>П</th>
                        <th>%</th>
                        <th>Забито</th>
                        <th>Пропущено</th>
                        <th>+/-</th>
                        <th>Очки</th>
                    </tr>
                </thead>
                <tbody id="teamStats"></tbody>
            </table>
        </div>
        <div class="table-header">
            <h3>Состав</h3>
            <hr>
        </div>
        <div class="team-squad" id="playerContainer">
            <div class="loading-animation">
                <div class="basketball"></div>
                <div class="loading-text">Загрузка<span class="dots"></span></div>
            </div>
        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="https://www.tiktok.com/@otz.summer.league" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.245V2h-3.445v13.672a2.896 2.896 0 0 1-5.201 1.743l-.002-.001.002.001a2.895 2.895 0 0 1 3.183-4.51v-3.5a6.329 6.329 0 0 0-5.394 10.692 6.33 6.33 0 0 0 10.857-4.424V8.687a8.182 8.182 0 0 0 4.773 1.526V6.79a4.831 4.831 0 0 1-1.003-.104z"/>
                    </svg>
                </a>
                <a href="https://t.me/pisunapidora" target="_blank">
                    <img src="/otz2025/img/TG.png" alt="Telegram">
                </a>
            </div>
            <p>© 2025 Over Time Zvenigorod. Все права защищены.</p>
        </div>
    </footer>
    <script>
        const CONFIG = {
            TOURNAMENT_DATA_URL: "https://raw.githubusercontent.com/otz2026/otz2025/main/SSTimeSS/tournament_data.json",
            PLAYERS_DATA_URL: "https://raw.githubusercontent.com/otz2026/otz2025/main/SSTimeSS/players_data.json",
            UPDATE_INTERVAL: 30000,
            TEAM_ID: "KITTY BOYS",
            DEFAULT_LOGO: "/otz2025/img/KITTY BOYS.png"
        };
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        let cachedData = null;
        let lastUpdateTime = 0;
        async function loadTeamData() {
            try {
                if (cachedData && Date.now() - lastUpdateTime < CONFIG.UPDATE_INTERVAL) {
                    return cachedData;
                }
                console.log('Загрузка данных для Kitty Boys...');
                const response = await fetch(CONFIG.TOURNAMENT_DATA_URL + `?t=${Date.now()}`);
                if (!response.ok) throw new Error(`Ошибка HTTP! Статус: ${response.status}`);
                const data = await response.json();
                const teamData = data.find(team => team.urlname === CONFIG.TEAM_ID) || getDefaultTeamData();
                cachedData = teamData;
                lastUpdateTime = Date.now();
                return teamData;
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                return cachedData || getDefaultTeamData();
            }
        }
        function getDefaultTeamData() {
            return {
                team: "Kitty Boys",
                logo: "/otz2025/img/KITTYBOYS.png",
                games: 0,
                wins: 0,
                losses: 0,
                scored: 0,
                conceded: 0,
                percentage: "0.0",
                difference: 0,
                points: 0,
                place: 1
            };
        }
        async function updateTeamStats() {
            const teamData = await loadTeamData();
            const tableBody = document.getElementById('teamStats');
            if (!tableBody) return;
            tableBody.innerHTML = `
                <tr>
                    <td>${teamData.place}</td>
                    <td class="team-cell">
                        <img src="${teamData.logo}" class="team-logo" onerror="this.src='${CONFIG.DEFAULT_LOGO}'">
                        ${teamData.team}
                    </td>
                    <td>${teamData.games}</td>
                    <td>${teamData.wins}</td>
                    <td>${teamData.losses}</td>
                    <td>${teamData.percentage}%</td>
                    <td>${teamData.scored}</td>
                    <td>${teamData.conceded}</td>
                    <td>${teamData.difference}</td>
                    <td>${teamData.points}</td>
                </tr>
            `;
        }
        async function loadPlayers() {
            const playerContainer = document.getElementById('playerContainer');
            if (!playerContainer) {
                console.error('playerContainer не найден');
                return;
            }
            try {
                playerContainer.innerHTML = `
                    <div class="loading-animation">
                        <div class="basketball"></div>
                        <div class="loading-text">Загрузка<span class="dots"></span></div>
                    </div>
                `;
                const response = await fetch(CONFIG.PLAYERS_DATA_URL + `?t=${Date.now()}`);
                if (!response.ok) throw new Error(`Ошибка загрузки игроков: ${response.status}`);
                const data = await response.json();
                displayPlayers(data.players, CONFIG.TEAM_ID);
            } catch (error) {
                console.error('Ошибка загрузки игроков:', error);
                showError(playerContainer, 'Не удалось загрузить состав команды.');
            }
        }
        function displayPlayers(players, teamId) {
            const playerContainer = document.getElementById('playerContainer');
            if (!playerContainer) return;
            const teamPlayers = players.filter(player => player.team === teamId);
            if (!teamPlayers || teamPlayers.length === 0) {
                playerContainer.innerHTML = `
                    <div class="player-empty">
                        Состав команды пока не доступен.
                    </div>
                `;
                return;
            }
            playerContainer.innerHTML = teamPlayers.map(player => `
                <div class="player-card">
                    <img src="/otz2025/img/teams/${player.photo}.jpg" alt="${player.name}" onerror="this.src='/otz2025/img/PLAYER_NO.png'">
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-stats">Рост: ${player.height} см</div>
                    </div>
                </div>
            `).join('');
        }
        function showError(container, message) {
            if (!container) return;
            console.warn('Ошибка отображения:', message);
            container.innerHTML = `
                <div class="loading-animation error">
                    <div class="basketball"></div>
                    <div class="loading-text">${message}</div>
                    <button class="refresh-button" onclick="handleRefresh()">Обновить</button>
                </div>
            `;
        }
        let isRefreshing = false;
        function handleRefresh() {
            if (isRefreshing) {
                console.warn('Перезагрузка уже выполняется, пропускаем');
                return;
            }
            isRefreshing = true;
            console.log('Перезагрузка страницы...');
            window.location.reload();
        }
        document.addEventListener('DOMContentLoaded', async () => {
            updateTeamStats();
            await delay(1000);
            await loadPlayers();
            setInterval(updateTeamStats, CONFIG.UPDATE_INTERVAL);
            window.addEventListener('scroll', () => {
                const header = document.getElementById('header');
                if (header) header.classList.toggle('scrolled', window.scrollY > 50);
            });
        });
    </script>
</body>
